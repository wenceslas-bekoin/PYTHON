{% extends 'base.html' %}

{% block title %}Liste des membres{% endblock %}

{% block content %}

    <h1>Liste des membres</h1>
    <ul>
        {% for membre in membres %}
           <li>{{ membre[0] }} - {{ membre[1] }} - {{ membre[2] }} - {{ membre[3] }}</li>
        {% endfor %}
    </ul> 
<!--retour à l'accueil-->
    <a href="{{url_for('accueil')}}">Retour à l'accueil</a>

{% endblock %}
